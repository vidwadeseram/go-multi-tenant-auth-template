name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... || true

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t go-multi-tenant-auth-template .

      - name: Start services
        run: |
          cp .env.example .env 2>/dev/null || true
          docker compose build
          docker compose up -d
          sleep 15

      - name: Run health check
        run: |
          curl -f http://localhost:8006/health || (docker compose logs && exit 1)

      - name: Tear down
        if: always()
        run: docker compose down 2>/dev/null || true
