services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8006:8000"
    depends_on:
      - db
      - mailhog
    command: ["/bin/sh", "./scripts/start.sh"]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    expose:
      - "1025"
      - "8025"

volumes:
  postgres_data:
